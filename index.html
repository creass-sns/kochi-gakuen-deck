<title>高知学園 × CREASS｜資料</title>
<style>
  :root{
    --ink:#14151a; --paper:#f7f4ee; --paper-warm:#efe9df;
    --line:#d8d0c2; --accent:#1d6a5c; --accent-soft:#e3efe9; --coral:#c0492f;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:"Zen Kaku Gothic New",-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    background:linear-gradient(135deg,var(--paper) 0%,var(--paper-warm) 100%);
    color:var(--ink); display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{
    width:100%; max-width:420px; background:#fff; border:1px solid var(--line);
    border-radius:16px; padding:40px 32px; box-shadow:0 12px 40px rgba(20,21,26,.10); text-align:center;
  }
  .badge{display:inline-block; font-size:12px; letter-spacing:.12em; color:var(--accent);
    background:var(--accent-soft); padding:6px 14px; border-radius:999px; margin-bottom:18px; font-weight:700;}
  h1{font-size:19px; margin:0 0 6px; font-weight:700;}
  p.sub{font-size:13px; color:#6b6f7a; margin:0 0 26px; line-height:1.6;}
  form{display:flex; flex-direction:column; gap:12px;}
  input[type=password]{
    width:100%; padding:14px 16px; font-size:16px; border:1.5px solid var(--line);
    border-radius:10px; outline:none; transition:border-color .15s; background:var(--paper);
  }
  input[type=password]:focus{border-color:var(--accent);}
  button{
    width:100%; padding:14px 16px; font-size:15px; font-weight:700; color:#fff; cursor:pointer;
    background:var(--accent); border:none; border-radius:10px; transition:opacity .15s,transform .05s;
  }
  button:hover{opacity:.92;} button:active{transform:translateY(1px);}
  button:disabled{opacity:.6; cursor:default;}
  .err{color:var(--coral); font-size:13px; min-height:18px; margin-top:4px;}
  .foot{margin-top:22px; font-size:11px; color:#9aa0ab; line-height:1.6;}
</style>

  async function deriveKey(pw,salt){
